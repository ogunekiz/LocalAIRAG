version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: local_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.4.15
    container_name: local_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/data
    restart: unless-stopped

volumes:
  ollama_data:
  chromadb_data: